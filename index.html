<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>FRIDAY AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: monospace;
  background:#060A0F;
  color:#E2E8F0;
  display:flex;
  flex-direction:column;
  height:100vh;
}

#chat {
  flex:1;
  overflow-y:auto;
  padding:15px;
}

.msg {
  margin:8px 0;
  padding:10px;
  border-radius:8px;
  max-width:70%;
}

.user {
  background:#00FFB322;
  align-self:flex-end;
}

.bot {
  background:#ffffff11;
  align-self:flex-start;
}

#controls {
  display:flex;
  justify-content:center;
  padding:10px;
  border-top:1px solid #333;
}

button {
  padding:15px 20px;
  font-size:20px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  background:#00FFB3;
}

</style>

</head>

<body>

<div id="chat"></div>

<div id="controls">
  <button id="mic">🎙️</button>
</div>

<script>
const chat = document.getElementById("chat");
const micBtn = document.getElementById("mic");

let recognition;
let listening = false;

// Speech Recognition setup
function initMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SR) {
    alert("Speech Recognition not supported. Use Chrome.");
    return;
  }

  recognition = new SR();
  recognition.lang = "en-US";
  recognition.interimResults = true;

  recognition.onstart = () => {
    listening = true;
    micBtn.innerText = "⏹";
  };

  recognition.onend = () => {
    listening = false;
    micBtn.innerText = "🎙️";
  };

  recognition.onresult = (e) => {
    let final = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        final += e.results[i][0].transcript;
      }
    }

    if (final) {
      addMessage(final, "user");
      askAI(final);
    }
  };

  recognition.onerror = (e) => {
    console.log(e.error);
  };
}

// Add message to UI
function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// Text to speech
function speak(text) {
  const utter = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(utter);
}

// Dummy AI (replace with real API if needed)
async function askAI(text) {
  const reply = "You said: " + text;
  addMessage(reply, "bot");
  speak(reply);
}

// Mic button
micBtn.onclick = () => {
  if (!recognition) initMic();

  if (listening) {
    recognition.stop();
  } else {
    recognition.start();
  }
};
</script>

</body>
</html>
