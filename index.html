<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>FRIDAY AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: monospace;
  background:#060A0F;
  color:#E2E8F0;
  display:flex;
  flex-direction:column;
  height:100vh;
}

#chat {
  flex:1;
  overflow-y:auto;
  padding:15px;
  display:flex;
  flex-direction:column;
}

.msg {
  margin:8px 0;
  padding:10px;
  border-radius:8px;
  max-width:70%;
}

.user {
  background:#00FFB322;
  align-self:flex-end;
}

.bot {
  background:#ffffff11;
  align-self:flex-start;
}

#controls {
  display:flex;
  justify-content:center;
  padding:10px;
  border-top:1px solid #333;
}

button {
  padding:15px 20px;
  font-size:20px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  background:#00FFB3;
}
</style>

</head>

<body>

<div id="chat"></div>

<div id="controls">
  <button id="mic">🎙️</button>
</div>

<script>
const chat = document.getElementById("chat");
const micBtn = document.getElementById("mic");

let recognition;
let listening = false;

// 🔑 PUT YOUR OPENROUTER KEY HERE
const API_KEY = "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";

// 🧠 SYSTEM PROMPT (FRIDAY personality)
const SYSTEM_PROMPT = `
You are FRIDAY, an advanced AI assistant like Iron Man's AI.
- Speak smart, short, confident.
- Occasionally call user "Boss".
- Always helpful.
- If user asks for action, respond like:
[ACTION: search | best restaurants near me]
`;

// 🎤 INIT MIC
function initMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SR) {
    alert("Use Chrome browser");
    return;
  }

  recognition = new SR();
  recognition.lang = "en-US";
  recognition.interimResults = false;

  recognition.onstart = () => {
    listening = true;
    micBtn.innerText = "⏹";
  };

  recognition.onend = () => {
    listening = false;
    micBtn.innerText = "🎙️";
  };

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    addMessage(text, "user");
    askAI(text);
  };
}

// 💬 ADD MESSAGE
function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// 🔊 SPEAK
function speak(text) {
  const clean = text.replace(/\[.*?\]/g, "");
  const utter = new SpeechSynthesisUtterance(clean);
  speechSynthesis.speak(utter);
}

// ⚡ ACTION EXECUTOR
function executeAction(text) {
  const match = text.match(/\[ACTION:\s*(\w+)\s*\|\s*(.+)\]/i);
  if (!match) return;

  const type = match[1];
  const detail = match[2];

  if (type === "search") {
    window.open("https://www.google.com/search?q=" + encodeURIComponent(detail));
  }

  if (type === "whatsapp") {
    window.open("https://web.whatsapp.com");
  }
}

// 🧠 ASK AI (OPENROUTER)
async function askAI(userText) {
  addMessage("Thinking...", "bot");

  try {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + API_KEY,
        "Content-Type": "application/json",
        "HTTP-Referer": "http://localhost",
        "X-Title": "FRIDAY AI"
      },
      body: JSON.stringify({
        model: "mistralai/mistral-7b-instruct"
        messages: [
          { role: "system", content: SYSTEM_PROMPT },
          { role: "user", content: userText }
        ]
      })
    });

    const data = await res.json();

    const reply = data.choices?.[0]?.message?.content || "No response";

    addMessage(reply, "bot");
    speak(reply);
    executeAction(reply);

  } catch (err) {
    addMessage("Error connecting to AI", "bot");
    console.error(err);
  }
}

// 🎙 BUTTON
micBtn.onclick = () => {
  if (!recognition) initMic();

  if (listening) {
    recognition.stop();
  } else {
    recognition.start();
  }
};
</script>

</body>
</html>
